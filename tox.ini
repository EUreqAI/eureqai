[tox]
envlist = py310, py311, py312, lint
isolated_build = True

[testenv]
deps =
    pytest>=7.4
    pytest-cov>=4.1
    pytest-mock>=3.12
    hypothesis>=6.90
commands =
    pytest {posargs:tests} --cov=eureqai --cov-report=xml

[testenv:lint]
deps =
    flake8>=6.0
commands =
    flake8 src tests

[flake8]
max-line-length = 88
extend-ignore = E203, W503, D100, D101, D102, D103, D104, D105, D107, D200, D205, D400, D401, Q000, E501
exclude =
    .tox,
    .venv,
    build,
    dist,
    # Unfinished prototypes — tracked for cleanup, not on the public surface.
    src/eureqai/metrics/robustness.py,
    src/eureqai/metrics/transparency.py,
    src/eureqai/metrics/fairness.py,
    src/eureqai/metrics/model_behavior.py,
    src/eureqai/metrics/common.py,
    src/eureqai/metrics/eu_compliance.py

[gh-actions]
python =
    3.10: py310, lint, type
    3.11: py311
    3.12: py312
